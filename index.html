<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Line Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg1:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;--bg4:#222636;--bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.12);--t1:#e8eaf0;--t2:#8891a8;--t3:#555e78;--blue:#4a9eff;--green:#3dd68c;--amber:#f5a623;--red:#ff5f5f;--purple:#a78bfa;--teal:#2dd4bf}
body{font-family:'DM Sans',sans-serif;background:var(--bg1);color:var(--t1);min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
input,select,button{font-family:'DM Sans',sans-serif}
.inp{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:0 12px;height:36px;font-size:13px;color:var(--t1);outline:none;width:100%;transition:border-color .15s;display:block}
.inp:focus{border-color:var(--blue);background:var(--bg4)}.inp::placeholder{color:var(--t3)}select.inp option{background:var(--bg3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 16px;height:36px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.bp{background:var(--blue);color:#0d0f14}.bp:hover{filter:brightness(1.1)}
.bg{background:var(--bg3);color:var(--t2);border:1px solid var(--bd)}.bg:hover{background:var(--bg4);color:var(--t1)}
.be{background:var(--bg3);color:var(--t3);border:1px solid var(--bd);width:30px;height:30px;padding:0;justify-content:center;border-radius:6px}.be:hover{color:var(--t1);background:var(--bg4)}
.bdel{background:rgba(255,95,95,0.1);color:var(--red);border:1px solid rgba(255,95,95,0.2);height:30px;padding:0 10px;font-size:12px;border-radius:6px}.bdel:hover{background:rgba(255,95,95,0.2)}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px}
.lbl{font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;display:block}
.mono{font-family:'IBM Plex Mono',monospace}
.tag{display:inline-flex;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;border-radius:4px;padding:2px 8px;border:1px solid;text-transform:uppercase;letter-spacing:.04em}
.t-avi{color:var(--blue);background:rgba(74,158,255,.1);border-color:rgba(74,158,255,.2)}
.t-mvi-m{color:var(--purple);background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.2)}
.t-mvi-map{color:var(--teal);background:rgba(45,212,191,.1);border-color:rgba(45,212,191,.2)}
.t-pack{color:var(--amber);background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.2)}
.good{color:var(--green)}.warn{color:var(--amber)}.bad{color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 14px;font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);white-space:nowrap;text-align:left}
td{padding:9px 14px;border-bottom:1px solid var(--bd);color:var(--t2);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}tbody tr:hover td{background:var(--bg3)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}.modal-bg.open{display:flex}
header{background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.hrow{display:flex;align-items:center;gap:16px;padding:0 24px;height:54px}
nav{display:flex;padding:0 24px;border-top:1px solid var(--bd)}
.tab{padding:10px 16px;font-size:12px;font-weight:500;background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.on{color:var(--t1);border-bottom-color:var(--blue)}
.fbtn{padding:4px 12px;border-radius:5px;font-size:12px;border:1px solid var(--bd);background:var(--bg3);color:var(--t2);cursor:pointer;transition:all .15s}
.fbtn:hover{background:var(--bg4)}.fbtn.on{background:rgba(74,158,255,.1);color:var(--blue);border-color:rgba(74,158,255,.3)}
main{max-width:1360px;margin:0 auto;padding:24px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <span class="mono" style="font-size:12px;font-weight:500;color:var(--blue);letter-spacing:.1em;text-transform:uppercase">PLT</span>
    <div style="width:1px;height:20px;background:var(--bd2)"></div>
    <span style="font-size:13px;color:var(--t2)">Production Line Tracker</span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
      <span class="mono" style="font-size:11px;color:var(--t3)" id="hdr-date"></span>
      <button class="btn bg" style="height:30px;font-size:12px;padding:0 12px" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
  </div>
  <nav>
    <button class="tab on" onclick="switchTab('input',this)">📋 Nhập liệu</button>
    <button class="tab" onclick="switchTab('kpi',this)">📊 KPI Dashboard</button>
    <button class="tab" onclick="switchTab('analysis',this)">📈 Phân tích & Yield</button>
  </nav>
</header>
<main>
  <div id="p-input">
    <div class="card" style="padding:20px;margin-bottom:16px">
      <span class="lbl" style="margin-bottom:12px">Nhập dữ liệu mới</span>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;align-items:end">
        <div><label class="lbl" style="margin-bottom:6px">Công đoạn</label><select class="inp" id="f-stage"><option>AVI</option><option>MVI Manual</option><option>MVI Mapping</option><option>Packing</option></select></div>
        <div><label class="lbl" style="margin-bottom:6px">Ngày</label><input type="date" class="inp" id="f-date"></div>
        <div><label class="lbl" style="margin-bottom:6px">Input (pcs)</label><input type="number" class="inp" id="f-input" placeholder="0" min="0"></div>
        <div><label class="lbl" style="margin-bottom:6px">Output (pcs)</label><input type="number" class="inp" id="f-output" placeholder="0" min="0"></div>
        <div><label class="lbl" style="margin-bottom:6px">Ghi chú</label><input type="text" class="inp" id="f-note" placeholder="Ghi chú..."></div>
        <div><label class="lbl" style="margin-bottom:6px;opacity:0">x</label><button class="btn bp" style="width:100%;justify-content:center" onclick="addRecord()">+ Thêm</button></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
      <span class="lbl">Lọc:</span>
      <button class="fbtn on" onclick="setFilter('ALL',this)">Tất cả</button>
      <button class="fbtn" onclick="setFilter('AVI',this)">AVI</button>
      <button class="fbtn" onclick="setFilter('MVI Manual',this)">MVI Manual</button>
      <button class="fbtn" onclick="setFilter('MVI Mapping',this)">MVI Mapping</button>
      <button class="fbtn" onclick="setFilter('Packing',this)">Packing</button>
    </div>
    <div class="card" style="overflow:hidden">
      <div style="padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px">
        <input type="text" class="inp" id="tbl-search" placeholder="🔍 Tìm kiếm..." style="width:220px;height:32px;font-size:12px" oninput="renderTable()">
        <span style="margin-left:auto;font-size:12px;color:var(--t3)" id="rec-count"></span>
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Ngày</th><th>Công đoạn</th><th style="text-align:right">Input</th><th style="text-align:right">Output</th><th style="text-align:right">Defect</th><th style="text-align:right">Yield</th><th>Ghi chú</th><th style="text-align:center">Thao tác</th></tr></thead>
        <tbody id="tbl-body"></tbody>
      </table></div>
    </div>
  </div>

  <div id="p-kpi" style="display:none">
    <div class="card" style="padding:16px;margin-bottom:16px"><span class="lbl" style="margin-bottom:12px">KPI Mục tiêu Yield (%)</span><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px" id="kpi-inputs"></div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px" id="kpi-cards"></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px" id="kpi-detail"></div>
  </div>

  <div id="p-analysis" style="display:none">
    <div class="card" style="padding:16px;margin-bottom:16px"><span class="lbl" style="margin-bottom:12px">Luồng Yield Process</span><div style="display:flex;align-items:center;gap:4px;overflow-x:auto;padding-bottom:4px" id="yield-flow"></div></div>
    <div class="g2" style="margin-bottom:16px">
      <div class="card" style="padding:16px"><span class="lbl" style="margin-bottom:12px">Chỉ số Yield tổng hợp</span><div id="yield-metrics"></div></div>
      <div class="card" style="padding:16px"><span class="lbl" style="margin-bottom:12px">Output & Tổng sản lượng</span><div id="output-metrics"></div></div>
    </div>
    <div class="g2">
      <div class="card" style="padding:16px"><span class="lbl" style="margin-bottom:12px">Yield từng công đoạn vs KPI</span><div id="yield-bars"></div></div>
      <div class="card" style="overflow:hidden">
        <div style="padding:10px 14px;border-bottom:1px solid var(--bd)"><span class="lbl">Bảng tóm tắt</span></div>
        <div style="overflow-x:auto"><table>
          <thead><tr><th>Công đoạn</th><th style="text-align:right">Input</th><th style="text-align:right">Output</th><th style="text-align:right">Defect</th><th style="text-align:right">Yield</th><th style="text-align:right">vs KPI</th></tr></thead>
          <tbody id="sum-body"></tbody>
        </table></div>
      </div>
    </div>
  </div>
</main>

<div class="modal-bg" id="edit-modal" onclick="if(event.target===this)closeModal()">
  <div style="background:var(--bg2);border:1px solid var(--bd2);border-radius:12px;padding:24px;width:520px;max-width:95vw">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <span style="font-size:15px;font-weight:500">Chỉnh sửa bản ghi</span>
      <button class="btn bg" style="height:30px;padding:0 10px;font-size:12px" onclick="closeModal()">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div><label class="lbl" style="margin-bottom:6px">Công đoạn</label><select class="inp" id="e-stage"><option>AVI</option><option>MVI Manual</option><option>MVI Mapping</option><option>Packing</option></select></div>
      <div><label class="lbl" style="margin-bottom:6px">Ngày</label><input type="date" class="inp" id="e-date"></div>
      <div><label class="lbl" style="margin-bottom:6px">Input (pcs)</label><input type="number" class="inp" id="e-input" min="0"></div>
      <div><label class="lbl" style="margin-bottom:6px">Output (pcs)</label><input type="number" class="inp" id="e-output" min="0"></div>
    </div>
    <div style="margin-bottom:20px"><label class="lbl" style="margin-bottom:6px">Ghi chú</label><input type="text" class="inp" id="e-note"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn bg" onclick="closeModal()">Hủy</button>
      <button class="btn bp" onclick="saveEdit()">✓ Lưu</button>
    </div>
  </div>
</div>

<script>
const STAGES=['AVI','MVI Manual','MVI Mapping','Packing'];
const META={'AVI':{color:'#4a9eff',tag:'t-avi',key:'avi',def:95},'MVI Manual':{color:'#a78bfa',tag:'t-mvi-m',key:'mviManual',def:93},'MVI Mapping':{color:'#2dd4bf',tag:'t-mvi-map',key:'mviMapping',def:92},'Packing':{color:'#f5a623',tag:'t-pack',key:'packing',def:98}};
const DEF={avi:95,mviManual:93,mviMapping:92,packing:98};
let records=[],kpis={...DEF},filterStage='ALL',editId=null;
try{records=JSON.parse(localStorage.getItem('plt_r')||'[]')}catch{}
try{kpis={...DEF,...JSON.parse(localStorage.getItem('plt_k')||'{}')} }catch{}
const saveR=()=>localStorage.setItem('plt_r',JSON.stringify(records));
const saveK=()=>localStorage.setItem('plt_k',JSON.stringify(kpis));
const fmt=n=>Number(n).toLocaleString('vi-VN');
const pct=(v,d=2)=>Number(v).toFixed(d)+'%';
const today=()=>new Date().toISOString().split('T')[0];
const calcY=(i,o)=>i>0?(o/i*100):0;
const yCls=y=>y>=95?'good':y>=90?'warn':'bad';
function stageSt(s){const rs=records.filter(r=>r.stage===s);const ti=rs.reduce((a,r)=>a+r.input,0),to=rs.reduce((a,r)=>a+r.output,0);return{totalIn:ti,totalOut:to,defect:ti-to,yld:calcY(ti,to),count:rs.length}}
function rollup(){return STAGES.reduce((acc,s)=>{const st=stageSt(s);return acc*(st.totalIn>0?st.totalOut/st.totalIn:1)},1)*100}
const tagH=s=>`<span class="tag ${META[s]?.tag||''}">${s}</span>`;
const ypH=(v,kpi)=>{if(v==null)return`<span style="color:var(--t3);font-family:'IBM Plex Mono',monospace;font-size:12px">—</span>`;const d=kpi!=null?v-kpi:null;const c=d!=null?(d>=0?'good':d>=-2?'warn':'bad'):yCls(v);return`<span class="mono ${c}" style="font-weight:500;font-size:13px">${pct(v)}</span>`};
const mrow=(l,v,c)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd)"><span style="font-size:13px;color:var(--t2)">${l}</span><span class="mono ${c||''}" style="font-size:13px;font-weight:500;${c?'':'color:var(--t1)'}">${v}</span></div>`;

document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('vi-VN',{weekday:'short',year:'numeric',month:'2-digit',day:'2-digit'});
document.getElementById('f-date').value=today();

function switchTab(tab,btn){
  ['input','kpi','analysis'].forEach(t=>document.getElementById('p-'+t).style.display='none');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('p-'+tab).style.display='';btn.classList.add('on');
  if(tab==='kpi')renderKPI();if(tab==='analysis')renderAnalysis();
}
function setFilter(s,btn){filterStage=s;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderTable()}
function addRecord(){
  const stage=document.getElementById('f-stage').value,date=document.getElementById('f-date').value;
  const input=parseInt(document.getElementById('f-input').value)||0,output=parseInt(document.getElementById('f-output').value)||0;
  const note=document.getElementById('f-note').value.trim();
  if(!date)return alert('Chọn ngày!');if(input<=0)return alert('Input phải > 0');if(output>input)return alert('Output không được > Input');
  records.push({id:Date.now(),stage,date,input,output,note});saveR();renderTable();
  document.getElementById('f-input').value='';document.getElementById('f-output').value='';document.getElementById('f-note').value='';document.getElementById('f-date').value=today();
}
function renderTable(){
  const q=(document.getElementById('tbl-search').value||'').toLowerCase();
  let list=records.filter(r=>(filterStage==='ALL'||r.stage===filterStage)&&(!q||r.stage.toLowerCase().includes(q)||r.date.includes(q)||(r.note||'').toLowerCase().includes(q))).sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  document.getElementById('rec-count').textContent=list.length+' bản ghi';
  const tb=document.getElementById('tbl-body');
  if(!list.length){tb.innerHTML=`<tr><td colspan="8" style="padding:48px 24px;text-align:center;color:var(--t3)">📭 Chưa có dữ liệu. Nhập liệu ở trên để bắt đầu.</td></tr>`;return}
  tb.innerHTML=list.map(r=>{const yld=calcY(r.input,r.output);const idx=records.findIndex(x=>x.id===r.id);
    return`<tr><td style="color:var(--t1);font-family:'IBM Plex Mono',monospace;font-size:12px">${r.date}</td><td>${tagH(r.stage)}</td><td style="text-align:right;font-family:'IBM Plex Mono',monospace;color:var(--t1)">${fmt(r.input)}</td><td style="text-align:right;font-family:'IBM Plex Mono',monospace;color:var(--t1)">${fmt(r.output)}</td><td style="text-align:right;font-family:'IBM Plex Mono',monospace;color:var(--red)">${fmt(r.input-r.output)}</td><td style="text-align:right">${ypH(yld)}</td><td style="color:var(--t3);font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.note||''}">${r.note||'—'}</td><td><div style="display:flex;gap:6px;justify-content:center"><button class="btn be" onclick="openEdit(${idx})" title="Sửa">✏</button><button class="btn bdel" onclick="delRecord(${idx})" title="Xóa">🗑</button></div></td></tr>`;
  }).join('');
}
function delRecord(idx){if(!confirm('Xóa bản ghi này?'))return;records.splice(idx,1);saveR();renderTable()}
function openEdit(idx){editId=records[idx].id;const r=records[idx];document.getElementById('e-stage').value=r.stage;document.getElementById('e-date').value=r.date;document.getElementById('e-input').value=r.input;document.getElementById('e-output').value=r.output;document.getElementById('e-note').value=r.note||'';document.getElementById('edit-modal').classList.add('open')}
function closeModal(){document.getElementById('edit-modal').classList.remove('open');editId=null}
function saveEdit(){
  const inp=parseInt(document.getElementById('e-input').value)||0,out=parseInt(document.getElementById('e-output').value)||0;
  if(out>inp)return alert('Output không được > Input');
  const idx=records.findIndex(r=>r.id===editId);if(idx<0)return;
  records[idx]={...records[idx],stage:document.getElementById('e-stage').value,date:document.getElementById('e-date').value,input:inp,output:out,note:document.getElementById('e-note').value.trim()};
  saveR();closeModal();renderTable();
}
function renderKPI(){
  document.getElementById('kpi-inputs').innerHTML=STAGES.map(s=>{const m=META[s];return`<div><label class="lbl" style="margin-bottom:6px;color:${m.color}">${s}</label><div style="position:relative"><input type="number" class="inp" style="font-family:'IBM Plex Mono',monospace;padding-right:24px" min="0" max="100" step="0.1" value="${kpis[m.key]}" onchange="kpis['${m.key}']=parseFloat(this.value)||0;saveK();renderKPI()"><span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px;font-family:'IBM Plex Mono',monospace">%</span></div></div>`}).join('');
  document.getElementById('kpi-cards').innerHTML=STAGES.map(s=>{const m=META[s],st=stageSt(s),kpi=kpis[m.key],has=st.totalIn>0;const diff=has?st.yld-kpi:0;const sc=diff>=0?'good':diff>=-2?'warn':'bad';const scC=sc==='good'?'var(--green)':sc==='warn'?'var(--amber)':'var(--red)';const scB=sc==='good'?'rgba(61,214,140,.1)':sc==='warn'?'rgba(245,166,35,.1)':'rgba(255,95,95,.1)';
    return`<div class="card" style="padding:16px;position:relative;overflow:hidden"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:${m.color}"></div><div style="margin-bottom:10px">${tagH(s)}</div><div class="mono" style="font-size:24px;font-weight:500;color:var(--t1);margin-bottom:4px;line-height:1">${has?pct(st.yld):'—'}</div><div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t3)"><span>KPI: ${pct(kpi)}</span>${has?`<span class="mono" style="font-size:11px;padding:2px 6px;border-radius:3px;background:${scB};color:${scC};border:1px solid ${scC}33">${diff>=0?'+':''}${diff.toFixed(2)}%</span>`:''}</div></div>`;
  }).join('');
  document.getElementById('kpi-detail').innerHTML=STAGES.map(s=>{const m=META[s],st=stageSt(s),kpi=kpis[m.key],has=st.totalIn>0;const expOut=has?Math.round(st.totalIn*kpi/100):0;
    const dr=(l,kv,av,good)=>{const ac=has?(good?'var(--green)':'var(--red)'):'var(--t3)';return`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd)"><span style="font-size:12px;color:var(--t3)">${l}</span><div style="display:flex;gap:8px;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:12px"><span style="color:var(--t3)">${kv}</span><span style="color:var(--t3)">→</span><span style="font-weight:500;color:${ac}">${has?av:'—'}</span></div></div>`};
    return`<div class="card" style="padding:14px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd)">${tagH(s)}<span style="font-size:10px;color:var(--t3);margin-left:auto">${st.count} lần nhập</span></div>${dr('Input','—',fmt(st.totalIn),true)}${dr('Output',fmt(expOut),fmt(st.totalOut),st.totalOut>=expOut)}${dr('Defect','—',fmt(st.defect),st.defect===0)}<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0"><span style="font-size:12px;color:var(--t3)">Yield</span><div style="display:flex;gap:8px;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:12px"><span style="color:var(--t3)">${pct(kpi)}</span><span style="color:var(--t3)">→</span>${ypH(has?st.yld:null,kpi)}</div></div></div>`;
  }).join('');
}
function renderAnalysis(){
  const stats=STAGES.map(s=>({stage:s,...stageSt(s)}));const ru=rollup();
  const totIn=stats.reduce((s,r)=>s+r.totalIn,0),totOut=stats.reduce((s,r)=>s+r.totalOut,0),totDef=stats.reduce((s,r)=>s+r.defect,0);
  document.getElementById('yield-flow').innerHTML=STAGES.map((s,i)=>{const st=stageSt(s),m=META[s],has=st.totalIn>0;
    return`${i>0?'<span style="color:var(--t3);font-size:16px;flex-shrink:0">→</span>':''}<div style="background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;min-width:130px;flex-shrink:0"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:${m.color};margin-bottom:4px">${s}</div><div class="mono" style="font-size:20px;font-weight:500;color:${m.color};line-height:1">${has?pct(st.yld):'—'}</div><div class="mono" style="font-size:10px;color:var(--t3);margin-top:4px">${has?fmt(st.totalIn)+' → '+fmt(st.totalOut):'Chưa có dữ liệu'}</div></div>`;
  }).join('');
  document.getElementById('yield-metrics').innerHTML=[['Roll-up Yield (tất cả)',pct(ru),'good'],...STAGES.map(s=>{const st=stageSt(s);return[`Yield ${s}`,st.totalIn>0?pct(st.yld):'—',null]})].map(([l,v,c])=>mrow(l,v,c)).join('');
  document.getElementById('output-metrics').innerHTML=[['Output cuối (Packing)',stats[3].totalOut>0?fmt(stats[3].totalOut)+' pcs':'—','warn'],['Input đầu vào (AVI)',stats[0].totalIn>0?fmt(stats[0].totalIn)+' pcs':'—',null],['Tổng Defect',fmt(totDef)+' pcs',totDef>0?'bad':null],['Tổng bản ghi',String(records.length),null],['Số ngày SX',String(new Set(records.map(r=>r.date)).size),null]].map(([l,v,c])=>mrow(l,v,c)).join('');
  document.getElementById('yield-bars').innerHTML=STAGES.map(s=>{const st=stageSt(s),m=META[s],kpi=kpis[m.key];
    return`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px"><span style="color:var(--t2)">${s}</span><span class="mono"><span style="color:${m.color}">${st.totalIn>0?pct(st.yld):'—'}</span><span style="color:var(--t3)"> / ${pct(kpi)}</span></span></div><div style="height:6px;background:var(--bg4);border-radius:3px;overflow:hidden"><div style="height:100%;background:${m.color};border-radius:3px;width:${st.totalIn>0?Math.min(st.yld,100):0}%;transition:width .5s"></div></div></div>`;
  }).join('');
  document.getElementById('sum-body').innerHTML=stats.map(st=>{const m=META[st.stage],kpi=kpis[m.key];const diff=st.totalIn>0?st.yld-kpi:null;
    return`<tr><td>${tagH(st.stage)}</td><td style="text-align:right;font-family:'IBM Plex Mono',monospace;color:var(--t1)">${fmt(st.totalIn)}</td><td style="text-align:right;font-family:'IBM Plex Mono',monospace;color:var(--t1)">${fmt(st.totalOut)}</td><td style="text-align:right;font-family:'IBM Plex Mono',monospace;color:var(--red)">${fmt(st.defect)}</td><td style="text-align:right">${ypH(st.totalIn>0?st.yld:null,kpi)}</td><td style="text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px">${diff!=null?`<span style="color:${diff>=0?'var(--green)':'var(--red)'}">${diff>=0?'+':''}${diff.toFixed(2)}%</span>`:'—'}</td></tr>`;
  }).join('')+`<tr style="background:var(--bg3)"><td style="font-size:12px;color:var(--t3);font-weight:500">Roll-up</td><td style="text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--t1)">${fmt(totIn)}</td><td style="text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--t1)">${fmt(totOut)}</td><td style="text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--red)">${fmt(totDef)}</td><td style="text-align:right"><span class="mono good" style="font-weight:500;font-size:13px">${pct(ru)}</span></td><td></td></tr>`;
}
function exportCSV(){const h=['id','stage','date','input','output','defect','yield_%','note'];const rows=records.map(r=>[r.id,r.stage,r.date,r.input,r.output,r.input-r.output,calcY(r.input,r.output).toFixed(2),r.note||''].join(','));const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent([h.join(','),...rows].join('\n'));a.download='production-'+today()+'.csv';a.click()}
renderTable();
</script>
