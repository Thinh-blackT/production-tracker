<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production Line Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#0d0f14;--bg2:#13161d;--bg3:#1a1e28;--bg4:#222636;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --t1:#e8eaf0;--t2:#8891a8;--t3:#555e78;
  --blue:#4a9eff;--green:#3dd68c;--amber:#f5a623;--red:#ff5f5f;--purple:#a78bfa;--teal:#2dd4bf;
  --sans:'DM Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
body{font-family:var(--sans);background:var(--bg1);color:var(--t1);min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
input,select,textarea{font-family:var(--sans)}
.inp{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:0 12px;height:36px;font-size:13px;color:var(--t1);outline:none;width:100%;transition:border-color .15s}
.inp:focus{border-color:var(--blue);background:var(--bg4)}
.inp::placeholder{color:var(--t3)}
select.inp option{background:var(--bg3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:0 16px;height:36px;border-radius:6px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--blue);color:#0d0f14}.btn-p:hover{filter:brightness(1.1)}
.btn-g{background:var(--bg3);color:var(--t2);border:1px solid var(--border)}.btn-g:hover{background:var(--bg4);color:var(--t1)}
.btn-d{background:rgba(255,95,95,0.1);color:var(--red);border:1px solid rgba(255,95,95,0.2);height:30px;padding:0 10px;font-size:12px}.btn-d:hover{background:rgba(255,95,95,0.2)}
.btn-e{background:var(--bg3);color:var(--t3);border:1px solid var(--border);width:30px;height:30px;padding:0;justify-content:center}.btn-e:hover{background:var(--bg4);color:var(--t1)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px}
.lbl{font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.mono{font-family:var(--mono)}
.tag{display:inline-flex;align-items:center;font-family:var(--mono);font-size:11px;font-weight:500;border-radius:4px;padding:2px 8px;border:1px solid;text-transform:uppercase;letter-spacing:.04em}
.tag-avi{color:var(--blue);background:rgba(74,158,255,.1);border-color:rgba(74,158,255,.2)}
.tag-mvi-m{color:var(--purple);background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.2)}
.tag-mvi-map{color:var(--teal);background:rgba(45,212,191,.1);border-color:rgba(45,212,191,.2)}
.tag-pack{color:var(--amber);background:rgba(245,166,35,.1);border-color:rgba(245,166,35,.2)}
.g-good{color:var(--green)}.g-warn{color:var(--amber)}.g-bad{color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 14px;border-bottom:1px solid var(--border);color:var(--t2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.ovl.on{display:flex}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useCallback}=React;
const {LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,Legend,ResponsiveContainer,BarChart,Bar}=Recharts;

// ── constants ──────────────────────────────────────────
const STAGES=['AVI','MVI Manual','MVI Mapping','Packing'];
const META={
  'AVI':        {color:'#4a9eff',tagCls:'tag-avi',  bar:'#4a9eff',key:'avi',       def:95},
  'MVI Manual': {color:'#a78bfa',tagCls:'tag-mvi-m',bar:'#a78bfa',key:'mviManual', def:93},
  'MVI Mapping':{color:'#2dd4bf',tagCls:'tag-mvi-map',bar:'#2dd4bf',key:'mviMapping',def:92},
  'Packing':    {color:'#f5a623',tagCls:'tag-pack', bar:'#f5a623',key:'packing',   def:98},
};
const DEF_KPIS={avi:95,mviManual:93,mviMapping:92,packing:98};
const RK='plt_records', KK='plt_kpis';

// ── utils ──────────────────────────────────────────────
const fmt=n=>Number(n).toLocaleString('vi-VN');
const pct=(v,d=2)=>Number(v).toFixed(d)+'%';
const today=()=>new Date().toISOString().split('T')[0];
function calcYield(inp,out){return inp>0?(out/inp*100):0}
function stageStats(records,stage){
  const rs=records.filter(r=>r.stage===stage);
  const ti=rs.reduce((s,r)=>s+r.input,0);
  const to=rs.reduce((s,r)=>s+r.output,0);
  return{stage,totalIn:ti,totalOut:to,defect:ti-to,yld:calcYield(ti,to),count:rs.length};
}
function allStats(records){return STAGES.map(s=>stageStats(records,s))}
function rollupYield(records){
  return STAGES.reduce((acc,s)=>{
    const {totalIn,totalOut}=stageStats(records,s);
    return acc*(totalIn>0?totalOut/totalIn:1);
  },1)*100;
}
function yieldCls(y){return y>=95?'g-good':y>=90?'g-warn':'g-bad'}
function statusCls(diff){return diff>=0?'good':diff>=-2?'warn':'bad'}

// ── storage hooks ──────────────────────────────────────
function useRecords(){
  const [records,setRecords]=useState(()=>{try{return JSON.parse(localStorage.getItem(RK)||'[]')}catch{return[]}});
  const save=useCallback(data=>{localStorage.setItem(RK,JSON.stringify(data));return data},[]);
  const add=useCallback(e=>{setRecords(p=>save([...p,{...e,id:Date.now()}]))},[save]);
  const upd=useCallback((id,u)=>{setRecords(p=>save(p.map(r=>r.id===id?{...r,...u}:r)))},[save]);
  const del=useCallback(id=>{setRecords(p=>save(p.filter(r=>r.id!==id)))},[save]);
  return{records,add,upd,del};
}
function useKPIs(){
  const [kpis,setKpis]=useState(()=>{try{return{...DEF_KPIS,...JSON.parse(localStorage.getItem(KK)||'{}')} }catch{return DEF_KPIS}});
  const upd=useCallback((k,v)=>{setKpis(p=>{const n={...p,[k]:parseFloat(v)||0};localStorage.setItem(KK,JSON.stringify(n));return n})},[]);
  return{kpis,upd};
}

// ── shared components ──────────────────────────────────
function Tag({stage}){return <span className={`tag ${META[stage]?.tagCls||''}`}>{stage}</span>}
function YPill({value,kpi}){
  if(value==null||value===undefined)return<span style={{color:'var(--t3)',fontFamily:'var(--mono)',fontSize:12}}>—</span>;
  const diff=kpi!=null?value-kpi:null;
  const ok=diff!=null?(diff>=0?'g-good':diff>=-2?'g-warn':'g-bad'):yieldCls(value);
  return<span className={`mono ${ok}`} style={{fontWeight:500,fontSize:13}}>{pct(value)}</span>;
}
function EmptyState({msg='Chưa có dữ liệu'}){
  return<div style={{padding:'48px 24px',textAlign:'center',color:'var(--t3)'}}>
    <div style={{fontSize:32,marginBottom:8}}>📭</div><p style={{fontSize:13}}>{msg}</p>
  </div>;
}

// ── PANEL: DataEntry ───────────────────────────────────
function RecordForm({onAdd}){
  const[f,setF]=useState({stage:'AVI',date:today(),input:'',output:'',note:''});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const submit=()=>{
    const inp=parseInt(f.input)||0,out=parseInt(f.output)||0;
    if(!f.date)return alert('Chọn ngày!');
    if(inp<=0)return alert('Input phải > 0');
    if(out>inp)return alert('Output không được > Input');
    onAdd({stage:f.stage,date:f.date,input:inp,output:out,note:f.note.trim()});
    setF(p=>({...p,input:'',output:'',note:''}));
  };
  const fld=(lbl,el)=><div style={{display:'flex',flexDirection:'column',gap:6}}>
    <label className="lbl">{lbl}</label>{el}
  </div>;
  return<div className="card" style={{padding:20,marginBottom:16}}>
    <p className="lbl" style={{marginBottom:12}}>Nhập dữ liệu mới</p>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:12,alignItems:'end'}}>
      {fld('Công đoạn',<select className="inp" value={f.stage} onChange={e=>set('stage',e.target.value)}>{STAGES.map(s=><option key={s}>{s}</option>)}</select>)}
      {fld('Ngày',<input type="date" className="inp" value={f.date} onChange={e=>set('date',e.target.value)}/>)}
      {fld('Input (pcs)',<input type="number" className="inp" placeholder="0" min="0" value={f.input} onChange={e=>set('input',e.target.value)}/>)}
      {fld('Output (pcs)',<input type="number" className="inp" placeholder="0" min="0" value={f.output} onChange={e=>set('output',e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>)}
      {fld('Ghi chú',<input type="text" className="inp" placeholder="Ghi chú..." value={f.note} onChange={e=>set('note',e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>)}
      {fld(<span style={{opacity:0}}>x</span>,<button className="btn btn-p" style={{width:'100%',justifyContent:'center'}} onClick={submit}>+ Thêm</button>)}
    </div>
  </div>;
}

function EditModal({open,record,onClose,onSave}){
  const[f,setF]=useState({});
  useEffect(()=>{if(record)setF({...record,input:String(record.input),output:String(record.output)})},[record]);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=()=>{
    const inp=parseInt(f.input)||0,out=parseInt(f.output)||0;
    if(out>inp)return alert('Output không được > Input');
    onSave(record.id,{stage:f.stage,date:f.date,input:inp,output:out,note:f.note||''});
    onClose();
  };
  if(!open)return null;
  return<div className={`ovl on`} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:12,padding:24,width:520,maxWidth:'95vw'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <span style={{fontSize:15,fontWeight:500}}>Chỉnh sửa bản ghi</span>
        <button className="btn btn-g" style={{height:30,padding:'0 10px',fontSize:12}} onClick={onClose}>✕</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
        {[['Công đoạn',<select className="inp" value={f.stage||''} onChange={e=>set('stage',e.target.value)}>{STAGES.map(s=><option key={s}>{s}</option>)}</select>],
          ['Ngày',<input type="date" className="inp" value={f.date||''} onChange={e=>set('date',e.target.value)}/>],
          ['Input (pcs)',<input type="number" className="inp" min="0" value={f.input||''} onChange={e=>set('input',e.target.value)}/>],
          ['Output (pcs)',<input type="number" className="inp" min="0" value={f.output||''} onChange={e=>set('output',e.target.value)}/>],
        ].map(([l,el])=><div key={l} style={{display:'flex',flexDirection:'column',gap:6}}><label className="lbl">{l}</label>{el}</div>)}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:20}}>
        <label className="lbl">Ghi chú</label>
        <input type="text" className="inp" value={f.note||''} onChange={e=>set('note',e.target.value)}/>
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <button className="btn btn-g" onClick={onClose}>Hủy</button>
        <button className="btn btn-p" onClick={save}>✓ Lưu</button>
      </div>
    </div>
  </div>;
}

function DataPanel({records,add,upd,del}){
  const[filter,setFilter]=useState('ALL');
  const[search,setSearch]=useState('');
  const[editRec,setEditRec]=useState(null);
  const filtered=useMemo(()=>{
    return records
      .filter(r=>(filter==='ALL'||r.stage===filter)&&
        (!search||r.stage.toLowerCase().includes(search.toLowerCase())||r.date.includes(search)||(r.note||'').toLowerCase().includes(search.toLowerCase())))
      .sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);
  },[records,filter,search]);

  return<div>
    <RecordForm onAdd={add}/>
    {/* filter */}
    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12,flexWrap:'wrap'}}>
      <span className="lbl">Lọc:</span>
      {['ALL',...STAGES].map(s=><button key={s} onClick={()=>setFilter(s)}
        style={{padding:'4px 12px',borderRadius:5,fontSize:12,border:'1px solid',cursor:'pointer',
          background:filter===s?'rgba(74,158,255,.1)':'var(--bg3)',
          color:filter===s?'var(--blue)':'var(--t2)',
          borderColor:filter===s?'rgba(74,158,255,.3)':'var(--border)'}}>
        {s==='ALL'?'Tất cả':s}
      </button>)}
    </div>
    {/* table */}
    <div className="card" style={{overflow:'hidden'}}>
      <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
        <input type="text" className="inp" placeholder="🔍 Tìm kiếm..." style={{width:220,height:32,fontSize:12}}
          value={search} onChange={e=>setSearch(e.target.value)}/>
        <span style={{marginLeft:'auto',fontSize:12,color:'var(--t3)'}}>{filtered.length} bản ghi</span>
      </div>
      <div style={{overflowX:'auto'}}>
        <table>
          <thead><tr>
            <th>Ngày</th><th>Công đoạn</th><th style={{textAlign:'right'}}>Input</th>
            <th style={{textAlign:'right'}}>Output</th><th style={{textAlign:'right'}}>Defect</th>
            <th style={{textAlign:'right'}}>Yield</th><th>Ghi chú</th><th style={{textAlign:'center'}}>Thao tác</th>
          </tr></thead>
          <tbody>
            {filtered.length===0
              ?<tr><td colSpan={8}><EmptyState/></td></tr>
              :filtered.map(r=>{
                const yld=calcYield(r.input,r.output);
                return<tr key={r.id}>
                  <td style={{color:'var(--t1)',fontFamily:'var(--mono)',fontSize:12}}>{r.date}</td>
                  <td><Tag stage={r.stage}/></td>
                  <td style={{textAlign:'right',fontFamily:'var(--mono)',color:'var(--t1)'}}>{fmt(r.input)}</td>
                  <td style={{textAlign:'right',fontFamily:'var(--mono)',color:'var(--t1)'}}>{fmt(r.output)}</td>
                  <td style={{textAlign:'right',fontFamily:'var(--mono)',color:'var(--red)'}}>{fmt(r.input-r.output)}</td>
                  <td style={{textAlign:'right'}}><YPill value={yld}/></td>
                  <td style={{color:'var(--t3)',fontSize:12,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.note}>{r.note||'—'}</td>
                  <td>
                    <div style={{display:'flex',gap:6,justifyContent:'center'}}>
                      <button className="btn btn-e" onClick={()=>setEditRec(r)} title="Sửa">✏</button>
                      <button className="btn btn-d" onClick={()=>{if(confirm('Xóa bản ghi này?'))del(r.id)}} title="Xóa">🗑</button>
                    </div>
                  </td>
                </tr>;
              })}
          </tbody>
        </table>
      </div>
    </div>
    <EditModal open={!!editRec} record={editRec} onClose={()=>setEditRec(null)} onSave={upd}/>
  </div>;
}

// ── PANEL: KPI ─────────────────────────────────────────
function KPIPanel({records,kpis,updKPI}){
  const stats=useMemo(()=>allStats(records),[records]);
  return<div>
    {/* KPI settings */}
    <div className="card" style={{padding:16,marginBottom:16}}>
      <p className="lbl" style={{marginBottom:12}}>KPI Mục tiêu Yield (%)</p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:12}}>
        {STAGES.map(s=>{
          const m=META[s];
          return<div key={s} style={{display:'flex',flexDirection:'column',gap:6}}>
            <label className="lbl" style={{color:m.color}}>{s}</label>
            <div style={{position:'relative'}}>
              <input type="number" className="inp" style={{fontFamily:'var(--mono)',paddingRight:24}}
                min="0" max="100" step="0.1" value={kpis[m.key]}
                onChange={e=>updKPI(m.key,e.target.value)}/>
              <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',color:'var(--t3)',fontSize:12,fontFamily:'var(--mono)'}}>%</span>
            </div>
          </div>;
        })}
      </div>
    </div>
    {/* summary cards */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12,marginBottom:16}}>
      {STAGES.map(s=>{
        const m=META[s];const st=stageStats(records,s);
        const kpi=kpis[m.key];const hasData=st.totalIn>0;
        const diff=hasData?st.yld-kpi:0;
        const sc=statusCls(diff);
        const scColor=sc==='good'?'var(--green)':sc==='warn'?'var(--amber)':'var(--red)';
        return<div key={s} className="card" style={{padding:16,position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:m.color}}/>
          <div style={{marginBottom:10}}><Tag stage={s}/></div>
          <div style={{fontFamily:'var(--mono)',fontSize:24,fontWeight:500,color:'var(--t1)',marginBottom:4,lineHeight:1}}>
            {hasData?pct(st.yld):'—'}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12,color:'var(--t3)'}}>
            <span>KPI: {pct(kpi)}</span>
            {hasData&&<span style={{fontFamily:'var(--mono)',fontSize:11,padding:'2px 6px',borderRadius:3,
              background:sc==='good'?'rgba(61,214,140,.1)':sc==='warn'?'rgba(245,166,35,.1)':'rgba(255,95,95,.1)',
              color:scColor,border:`1px solid ${scColor}33`}}>
              {diff>=0?'+':''}{diff.toFixed(2)}%
            </span>}
          </div>
        </div>;
      })}
    </div>
    {/* stage detail */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:12}}>
      {STAGES.map(s=>{
        const m=META[s];const st=stageStats(records,s);
        const kpi=kpis[m.key];const hasData=st.totalIn>0;
        const expOut=hasData?Math.round(st.totalIn*kpi/100):0;
        const row=(lbl,kv,av,good)=>{
          const ac=hasData?(good?'var(--green)':'var(--red)'):'var(--t3)';
          return<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
            padding:'6px 0',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontSize:12,color:'var(--t3)'}}>{lbl}</span>
            <div style={{display:'flex',gap:8,alignItems:'center',fontFamily:'var(--mono)',fontSize:12}}>
              <span style={{color:'var(--t3)'}}>{kv}</span>
              <span style={{color:'var(--t3)'}}>→</span>
              <span style={{fontWeight:500,color:ac}}>{hasData?av:'—'}</span>
            </div>
          </div>;
        };
        return<div key={s} className="card" style={{padding:14}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,paddingBottom:8,borderBottom:'1px solid var(--border)'}}>
            <Tag stage={s}/>
            <span style={{fontSize:10,color:'var(--t3)',marginLeft:'auto'}}>{st.count} lần nhập</span>
          </div>
          {row('Input','—',fmt(st.totalIn),true)}
          {row('Output',fmt(expOut),fmt(st.totalOut),st.totalOut>=expOut)}
          {row('Defect','—',fmt(st.defect),st.defect===0)}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0'}}>
            <span style={{fontSize:12,color:'var(--t3)'}}>Yield</span>
            <div style={{display:'flex',gap:8,alignItems:'center',fontFamily:'var(--mono)',fontSize:12}}>
              <span style={{color:'var(--t3)'}}>{pct(kpi)}</span>
              <span style={{color:'var(--t3)'}}>→</span>
              <YPill value={hasData?st.yld:null} kpi={kpi}/>
            </div>
          </div>
        </div>;
      })}
    </div>
  </div>;
}

// ── PANEL: Analysis ────────────────────────────────────
function buildTrend(records){
  const map={};
  records.forEach(r=>{
    if(!map[r.date])map[r.date]={};
    if(!map[r.date][r.stage])map[r.date][r.stage]={i:0,o:0};
    map[r.date][r.stage].i+=r.input;
    map[r.date][r.stage].o+=r.output;
  });
  return Object.keys(map).sort().map(d=>{
    const row={date:d.slice(5)};
    STAGES.forEach(s=>{const v=map[d][s];row[s]=v?parseFloat(calcYield(v.i,v.o).toFixed(2)):null});
    return row;
  });
}

const CTooltip=({active,payload,label})=>{
  if(!active||!payload?.length)return null;
  return<div style={{background:'var(--bg4)',border:'1px solid var(--border2)',borderRadius:8,padding:'8px 12px',fontSize:11}}>
    <p style={{color:'var(--t3)',marginBottom:6,fontFamily:'var(--mono)'}}>{label}</p>
    {payload.map(p=>p.value!=null&&<div key={p.name} style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
      <span style={{width:8,height:8,borderRadius:'50%',background:p.color,display:'inline-block'}}/>
      <span style={{color:'var(--t2)'}}>{p.name}</span>
      <span style={{fontFamily:'var(--mono)',fontWeight:500,color:'var(--t1)',marginLeft:'auto',paddingLeft:12}}>{p.value}%</span>
    </div>)}
  </div>;
};

function AnalysisPanel({records,kpis}){
  const stats=useMemo(()=>allStats(records),[records]);
  const rollup=useMemo(()=>rollupYield(records),[records]);
  const trend=useMemo(()=>buildTrend(records),[records]);
  const totIn=stats.reduce((s,r)=>s+r.totalIn,0);
  const totOut=stats.reduce((s,r)=>s+r.totalOut,0);
  const totDef=stats.reduce((s,r)=>s+r.defect,0);

  const metricRow=(lbl,val,cls)=><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
    padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
    <span style={{fontSize:13,color:'var(--t2)'}}>{lbl}</span>
    <span className={`mono ${cls||''}`} style={{fontSize:13,fontWeight:500,color:cls?undefined:'var(--t1)'}}>{val}</span>
  </div>;

  return<div>
    {/* yield flow */}
    <div className="card" style={{padding:16,marginBottom:16}}>
      <p className="lbl" style={{marginBottom:12}}>Luồng Yield Process</p>
      <div style={{display:'flex',alignItems:'center',gap:4,overflowX:'auto',paddingBottom:4}}>
        {STAGES.map((s,i)=>{
          const st=stageStats(records,s);const m=META[s];const has=st.totalIn>0;
          return<React.Fragment key={s}>
            <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px',minWidth:130,flexShrink:0}}>
              <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'.08em',color:m.color,marginBottom:4}}>{s}</div>
              <div style={{fontFamily:'var(--mono)',fontSize:20,fontWeight:500,color:m.color,lineHeight:1}}>{has?pct(st.yld):'—'}</div>
              <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--t3)',marginTop:4}}>
                {has?`${fmt(st.totalIn)} → ${fmt(st.totalOut)}`:'Chưa có dữ liệu'}
              </div>
            </div>
            {i<STAGES.length-1&&<span style={{color:'var(--t3)',fontSize:16,flexShrink:0}}>→</span>}
          </React.Fragment>;
        })}
      </div>
    </div>

    {/* trend chart */}
    {trend.length>=2&&<div className="card" style={{padding:16,marginBottom:16}}>
      <p className="lbl" style={{marginBottom:12}}>Xu hướng Yield theo ngày</p>
      <ResponsiveContainer width="100%" height={200}>
        <LineChart data={trend} margin={{top:4,right:8,bottom:0,left:-10}}>
          <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)"/>
          <XAxis dataKey="date" tick={{fill:'#555e78',fontSize:11,fontFamily:'IBM Plex Mono'}}/>
          <YAxis domain={[80,100]} tick={{fill:'#555e78',fontSize:11,fontFamily:'IBM Plex Mono'}} tickFormatter={v=>v+'%'}/>
          <Tooltip content={<CTooltip/>}/>
          <Legend wrapperStyle={{fontSize:11,color:'#8891a8'}}/>
          {STAGES.map(s=><Line key={s} type="monotone" dataKey={s} stroke={META[s].color}
            strokeWidth={1.5} dot={{r:3,fill:META[s].color}} connectNulls/>)}
        </LineChart>
      </ResponsiveContainer>
    </div>}

    {/* metrics grid */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
      <div className="card" style={{padding:16}}>
        <p className="lbl" style={{marginBottom:12}}>Chỉ số Yield tổng hợp</p>
        {metricRow('Roll-up Yield (tất cả)',pct(rollup),'g-good')}
        {STAGES.map(s=>{const st=stageStats(records,s);return metricRow(`Yield ${s}`,st.totalIn>0?pct(st.yld):'—',null);})}
      </div>
      <div className="card" style={{padding:16}}>
        <p className="lbl" style={{marginBottom:12}}>Output & Tổng sản lượng</p>
        {metricRow('Output cuối (Packing)',stats[3].totalOut>0?fmt(stats[3].totalOut)+' pcs':'—','g-warn')}
        {metricRow('Input đầu vào (AVI)',stats[0].totalIn>0?fmt(stats[0].totalIn)+' pcs':'—',null)}
        {metricRow('Tổng Defect',fmt(totDef)+' pcs',totDef>0?'g-bad':null)}
        {metricRow('Tổng bản ghi',String(records.length),null)}
        {metricRow('Số ngày SX',String(new Set(records.map(r=>r.date)).size),null)}
      </div>
    </div>

    {/* yield bars + summary table */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
      <div className="card" style={{padding:16}}>
        <p className="lbl" style={{marginBottom:12}}>Yield từng công đoạn vs KPI</p>
        {STAGES.map(s=>{
          const m=META[s];const st=stageStats(records,s);const kpi=kpis[m.key];
          return<div key={s} style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:4,fontSize:12}}>
              <span style={{color:'var(--t2)'}}>{s}</span>
              <span style={{fontFamily:'var(--mono)'}}>
                <span style={{color:m.color}}>{st.totalIn>0?pct(st.yld):'—'}</span>
                <span style={{color:'var(--t3)'}}> / {pct(kpi)}</span>
              </span>
            </div>
            <div style={{height:6,background:'var(--bg4)',borderRadius:3,overflow:'hidden'}}>
              <div style={{height:'100%',background:m.color,borderRadius:3,
                width:st.totalIn>0?`${Math.min(st.yld,100)}%`:'0%',transition:'width .5s'}}/>
            </div>
          </div>;
        })}
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)'}}>
          <p className="lbl">Bảng tóm tắt</p>
        </div>
        <div style={{overflowX:'auto'}}>
          <table>
            <thead><tr>
              <th>Công đoạn</th><th style={{textAlign:'right'}}>Input</th>
              <th style={{textAlign:'right'}}>Output</th><th style={{textAlign:'right'}}>Defect</th>
              <th style={{textAlign:'right'}}>Yield</th><th style={{textAlign:'right'}}>vs KPI</th>
            </tr></thead>
            <tbody>
              {stats.map(st=>{
                const m=META[st.stage];const kpi=kpis[m.key];
                const diff=st.totalIn>0?st.yld-kpi:null;
                return<tr key={st.stage}>
                  <td><Tag stage={st.stage}/></td>
                  <td style={{textAlign:'right',fontFamily:'var(--mono)',color:'var(--t1)'}}>{fmt(st.totalIn)}</td>
                  <td style={{textAlign:'right',fontFamily:'var(--mono)',color:'var(--t1)'}}>{fmt(st.totalOut)}</td>
                  <td style={{textAlign:'right',fontFamily:'var(--mono)',color:'var(--red)'}}>{fmt(st.defect)}</td>
                  <td style={{textAlign:'right'}}><YPill value={st.totalIn>0?st.yld:null} kpi={kpi}/></td>
                  <td style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12}}>
                    {diff!=null?<span style={{color:diff>=0?'var(--green)':'var(--red)'}}>{diff>=0?'+':''}{diff.toFixed(2)}%</span>:'—'}
                  </td>
                </tr>;
              })}
              <tr style={{background:'var(--bg3)'}}>
                <td style={{fontSize:12,color:'var(--t3)',fontWeight:500}}>Roll-up</td>
                <td style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,color:'var(--t1)'}}>{fmt(totIn)}</td>
                <td style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,color:'var(--t1)'}}>{fmt(totOut)}</td>
                <td style={{textAlign:'right',fontFamily:'var(--mono)',fontSize:12,color:'var(--red)'}}>{fmt(totDef)}</td>
                <td style={{textAlign:'right'}}><span className="mono g-good" style={{fontWeight:500,fontSize:13}}>{pct(rollup)}</span></td>
                <td/>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>;
}

// ── APP ROOT ───────────────────────────────────────────
const TABS=[
  {id:'input', label:'📋 Nhập liệu'},
  {id:'kpi',   label:'📊 KPI Dashboard'},
  {id:'analysis',label:'📈 Phân tích & Yield'},
];

function App(){
  const[tab,setTab]=useState('input');
  const{records,add,upd,del}=useRecords();
  const{kpis,upd:updKPI}=useKPIs();

  const exportCSV=()=>{
    const hdr=['id','stage','date','input','output','defect','yield_%','note'];
    const rows=records.map(r=>[r.id,r.stage,r.date,r.input,r.output,r.input-r.output,
      calcYield(r.input,r.output).toFixed(2),r.note||''].join(','));
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent([hdr.join(','),...rows].join('\n'));
    a.download=`production-${today()}.csv`;a.click();
  };

  return<div style={{minHeight:'100vh',background:'var(--bg1)'}}>
    {/* header */}
    <header style={{background:'var(--bg2)',borderBottom:'1px solid var(--border)',position:'sticky',top:0,zIndex:50}}>
      <div style={{display:'flex',alignItems:'center',gap:16,padding:'0 24px',height:54}}>
        <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:500,color:'var(--blue)',letterSpacing:'.1em',textTransform:'uppercase'}}>PLT</span>
        <div style={{width:1,height:20,background:'var(--border2)'}}/>
        <span style={{fontSize:13,color:'var(--t2)'}}>Production Line Tracker</span>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--t3)'}}>
            {new Date().toLocaleDateString('vi-VN',{weekday:'short',year:'numeric',month:'2-digit',day:'2-digit'})}
          </span>
          <button className="btn btn-g" style={{height:30,fontSize:12,padding:'0 12px'}} onClick={exportCSV}>⬇ Export CSV</button>
        </div>
      </div>
      {/* tabs */}
      <nav style={{display:'flex',padding:'0 24px',borderTop:'1px solid var(--border)'}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)}
          style={{padding:'10px 16px',fontSize:12,fontWeight:500,background:'none',border:'none',
            borderBottom:`2px solid ${tab===t.id?'var(--blue)':'transparent'}`,
            color:tab===t.id?'var(--t1)':'var(--t3)',cursor:'pointer',transition:'all .15s',whiteSpace:'nowrap'}}>
          {t.label}
        </button>)}
      </nav>
    </header>
    {/* content */}
    <main style={{maxWidth:1360,margin:'0 auto',padding:'24px 24px'}}>
      {tab==='input'    &&<DataPanel records={records} add={add} upd={upd} del={del}/>}
      {tab==='kpi'      &&<KPIPanel records={records} kpis={kpis} updKPI={updKPI}/>}
      {tab==='analysis' &&<AnalysisPanel records={records} kpis={kpis}/>}
    </main>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
